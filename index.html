<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面经卡片系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #f5f9ff 0%, #ffffff 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
    }

    .container {
      width: 100%;
    }

    .header {
      text-align: center;
      color: #0066cc;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: none;
      font-weight: 700;
      background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.8;
      color: #666;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 102, 204, 0.08);
      position: relative;
      overflow: hidden;
      border: 1px solid #e6f2ff;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #0066cc, #0052a3);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 102, 204, 0.12);
    }

    .card-header {
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1.3rem;
      color: #0066cc;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 12px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .difficulty {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .difficulty.easy {
      background: #e6f7ed;
      color: #0b5345;
    }

    .difficulty.medium {
      background: #e6f2ff;
      color: #0066cc;
    }

    .difficulty.hard {
      background: #ffe6e6;
      color: #cc0000;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      background: #e6f2ff;
      color: #0066cc;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .card-summary {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.5;
      height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      margin-top: 12px;
      text-align: right;
      color: #0066cc;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .detail-view {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .detail-view.active {
      display: flex;
    }

    .detail-content {
      background: white;
      border-radius: 12px;
      max-width: 900px;
      width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 102, 204, 0.15);
    }

    .detail-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 32px;
      height: 32px;
      border: none;
      background: #e6f2ff;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s ease;
      color: #0066cc;
    }

    .detail-close:hover {
      background: #cce5ff;
    }

    .detail-header {
      margin-bottom: 30px;
      border-bottom: 2px solid #e6f2ff;
      padding-bottom: 20px;
    }

    .detail-title {
      font-size: 2rem;
      color: #0066cc;
      margin-bottom: 12px;
      font-weight: 700;
    }
    }

    .detail-meta {
      display: flex;
      gap: 20px;
      color: #666;
      font-size: 0.95rem;
    }

    .detail-markdown {
      color: #333;
      line-height: 1.8;
      font-size: 1rem;
    }

    .detail-markdown h1,
    .detail-markdown h2,
    .detail-markdown h3,
    .detail-markdown h4,
    .detail-markdown h5,
    .detail-markdown h6 {
      margin-top: 20px;
      margin-bottom: 10px;
      font-weight: 600;
      color: #0066cc;
    }

    .detail-markdown h1 { font-size: 1.8rem; }
    .detail-markdown h2 { font-size: 1.5rem; }
    .detail-markdown h3 { font-size: 1.3rem; }

    .detail-markdown p {
      margin-bottom: 12px;
    }

    .detail-markdown ul,
    .detail-markdown ol {
      margin-left: 20px;
      margin-bottom: 12px;
    }

    .detail-markdown li {
      margin-bottom: 6px;
    }

    .detail-markdown code {
      background: #f0f7ff;
      padding: 2px 6px;
      border-radius: 3px;
      color: #0066cc;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9em;
    }

    .detail-markdown pre {
      background: #f0f7ff;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 12px;
      border-left: 3px solid #0066cc;
    }

    .detail-markdown pre code {
      background: none;
      padding: 0;
      color: #0066cc;
    }

    .detail-markdown blockquote {
      border-left: 4px solid #0066cc;
      padding-left: 16px;
      margin-left: 0;
      margin-bottom: 12px;
      color: #666;
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      color: #666;
      padding: 100px 20px;
    }

    .empty-state h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }

      .detail-content {
        padding: 20px;
        width: 95vw;
      }

      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <div class="header">
        <h1>📚 面经知识库</h1>
        <p>精选面试经验和技术总结</p>
      </div>

      <div class="cards-grid" id="cardsContainer"></div>

      <div class="empty-state" id="emptyState" style="display: none;">
        <h2>暂无面经</h2>
        <p>请在 interviews/ 文件夹中添加 markdown 文件</p>
      </div>
    </div>

    <div class="detail-view" id="detailView">
      <div class="detail-content">
        <button class="detail-close" onclick="closeDetail()">×</button>
        <div class="detail-header">
          <h1 class="detail-title" id="detailTitle"></h1>
          <div class="detail-meta">
            <span>🏢 <span id="detailCompany"></span></span>
            <span>💼 <span id="detailPosition"></span></span>
            <span>📅 <span id="detailDate"></span></span>
            <span class="difficulty" id="detailDifficulty"></span>
          </div>
        </div>
        <div class="detail-markdown" id="detailMarkdown"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked/+esm';

    let interviews = [];

    // 加载面经数据
    async function loadInterviews() {
      try {
        // 构建正确的数据文件路径
        const basePath = window.location.pathname.includes('/Interview-Card-CMS/') 
          ? '/Interview-Card-CMS/interviews.json'
          : '/interviews.json';
        const response = await fetch(basePath);
        if (!response.ok) throw new Error('Failed to load interviews');
        interviews = await response.json();
        renderCards();
      } catch (error) {
        console.error('Error loading interviews:', error);
        document.getElementById('emptyState').style.display = 'block';
      }
    }

    // 渲染卡片
    function renderCards() {
      const container = document.getElementById('cardsContainer');
      
      if (interviews.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      container.innerHTML = interviews.map((interview, index) => `
        <div class="card" onclick="showDetail(${index})">
          <div class="card-header">
            <div class="card-title">${escapeHtml(interview.title)}</div>
            <div class="card-meta">
              <div class="meta-item">🏢 ${escapeHtml(interview.company)}</div>
              <div class="meta-item">💼 ${escapeHtml(interview.position)}</div>
            </div>
          </div>
          <div class="tags">
            ${(interview.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
          <div class="difficulty ${interview.difficulty.toLowerCase()}">
            ${interview.difficulty}
          </div>
          <div class="card-summary">${escapeHtml(interview.summary)}</div>
          <div class="card-footer">查看详情 →</div>
        </div>
      `).join('');
    }

    // 显示详情视图
    window.showDetail = function(index) {
      const interview = interviews[index];
      document.getElementById('detailTitle').textContent = interview.title;
      document.getElementById('detailCompany').textContent = interview.company;
      document.getElementById('detailPosition').textContent = interview.position;
      document.getElementById('detailDate').textContent = new Date(interview.date).toLocaleDateString('zh-CN');
      
      const difficultyEl = document.getElementById('detailDifficulty');
      difficultyEl.textContent = interview.difficulty;
      difficultyEl.className = `difficulty ${interview.difficulty.toLowerCase()}`;
      
      // 使用 marked 渲染 markdown
      const htmlContent = marked(interview.content);
      document.getElementById('detailMarkdown').innerHTML = htmlContent;
      
      document.getElementById('detailView').classList.add('active');
    };

    // 关闭详情视图
    window.closeDetail = function() {
      document.getElementById('detailView').classList.remove('active');
    };

    // HTML转义
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // 点击背景关闭详情
    document.getElementById('detailView').addEventListener('click', function(e) {
      if (e.target === this) {
        closeDetail();
      }
    });

    // 初始化
    loadInterviews();
  </script>
</body>
</html>
